<div class="safeq-app-wrapper" [class.sidebar-active]="sidebarAberta">
  
  @if (mostrarMenu()) {
    <!-- BOTÃO -->
    <button type="button" (click)="alternarSidebar()" class="btn-dots-trigger">
      <i class="bi bi-three-dots-vertical"></i>
    </button>

    <!-- ABA LATERAL -->
    <aside class="side-drawer-clean">
      <div class="drawer-inner">
        
        <!-- HEADER COM AVATAR -->
        <div class="drawer-header">
          <div class="avatar-box">
            <img src="/default-avatar.png" alt="Avatar" (click)="navegarParaUsuarios()">
          </div>
          <div class="user-meta">
            <span class="name">{{ usuarioNome }}</span>
            <span class="role">{{ usuarioPerfil }}</span>
          </div>
        </div>

        <!-- NAVEGAÇÃO -->
        <nav class="drawer-nav">
          <a class="nav-link" [routerLink]="['/dashboard']" routerLinkActive="active" (click)="alternarSidebar()">
            <i class="bi bi-grid-1x2"></i> <span>Dashboard</span>
          </a>
          <a class="nav-link" [routerLink]="['/receitas']" routerLinkActive="active" (click)="alternarSidebar()">
            <i class="bi bi-plus-circle"></i> <span>Lançamentos</span>
          </a>
          <a class="nav-link" [routerLink]="['/categorias']" routerLinkActive="active" (click)="alternarSidebar()">
            <i class="bi bi-bookmark"></i> <span>Categorias</span>
          </a>
          <a class="nav-link" [routerLink]="['/relatorios']" routerLinkActive="active" (click)="alternarSidebar()">
            <i class="bi bi-bar-chart-line"></i> <span>Relatórios</span>
          </a>
        </nav>

        <!-- FOOTER -->
        <div class="drawer-footer">
          <button (click)="executarLogout()" class="btn-logout">
            <i class="bi bi-power"></i>
            <span>Encerrar Sessão</span>
          </button>
        </div>
      </div>
    </aside>

    <div class="sidebar-overlay" (click)="alternarSidebar()"></div>
  }

  <main class="main-viewport">
    <div class="content-limiter">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
