<div class="login-lock-viewport">
  
  <!-- IMAGEM DE FUNDO FIXA -->
  <div class="bg-fixed-layer"></div>

  <!-- ALERTAS DE SEGURANÇA GLOBAIS -->
  @if (mensagemErro) {
    <div class="custom-notification error animate-fade-in">
      <i class="bi bi-shield-exclamation-fill"></i>
      <span>{{ mensagemErro }}</span>
    </div>
  }

  @if (mensagemSucesso) {
    <div class="custom-notification success animate-fade-in">
      <i class="bi bi-check-circle-fill"></i>
      <span>{{ mensagemSucesso }}</span>
    </div>
  }

  <!-- BOTÃO VOLTAR -->
  <a routerLink="/" class="btn-back-home">
    <i class="bi bi-arrow-left-circle-fill"></i>
    <span>Portal Público</span>
  </a>

  <!-- PAINEL CENTRAL -->
  <div class="central-auth-card">
    
    <!-- CABEÇALHO CENTRALIZADO -->
    <div class="hero-header-section">
      <h1 class="hero-title-combined">SISTEMA DE ANÁLISE FINANCEIRO</h1>
      <p class="hero-subtitle">Introduza os dados de acesso corporativo</p>
    </div>

    <div class="auth-split-layout">
      
      <!-- LADO ESQUERDO: FORMULÁRIO -->
      <div class="form-side">
        <form (ngSubmit)="executarAutenticacao()">
          <div class="mb-4">
            <label class="label-premium">E-mail Corporativo</label>
            <div class="input-glass-box">
              <i class="bi bi-envelope-at"></i>
              <input type="email" [(ngModel)]="credenciais.email" name="email" placeholder="utilizador@safeq.ao" required>
            </div>
          </div>

          <div class="mb-4">
            <label class="label-premium">Palavra-passe</label>
            <div class="input-glass-box">
              <i class="bi bi-shield-lock"></i>
              <input type="password" [(ngModel)]="credenciais.password" name="password" placeholder="••••••••••••" required>
            </div>
          </div>

          <button type="submit" class="btn-submit-premium" [disabled]="carregando">
            @if (!carregando) {
              <span>Entrar no Sistema</span>
            } @else {
              <div class="spinner-border spinner-border-sm"></div>
            }
          </button>
        </form>
      </div>

      <!-- DIVISOR -->
      <div class="auth-divider"></div>

      <!-- LADO DIREITO: DEMO -->
      <div class="demo-side">
        <p class="text-white-50 small fw-bold text-uppercase mb-3">Acesso Rápido</p>
        
        <div class="demo-list">
          <button (click)="preencherCamposDemo('admin@safeq.ao', 'Safeq@Admin#2026')" class="demo-row">
            <span class="role admin text-white">ADMIN</span>
            <span class="hint text-white">admin@safeq.ao</span>
          </button>

          <button (click)="preencherCamposDemo('gestor@safeq.ao', 'Safeq@Gestor#2026')" class="demo-row">
            <span class="role gestor text-white">GESTOR</span>
            <span class="hint text-white">gestor@safeq.ao</span>
          </button>

          <button (click)="preencherCamposDemo('diretor@safeq.ao', 'Safeq@Diretor#2026')" class="demo-row">
            <span class="role diretor text-white">DIRETOR</span>
            <span class="hint text-white">diretor@safeq.ao</span>
          </button>
        </div>
      </div>

    </div>

  </div>
</div>
