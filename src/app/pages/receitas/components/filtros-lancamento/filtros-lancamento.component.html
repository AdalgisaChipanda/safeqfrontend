<div class="filter-analytical-header p-2 border bg-light-translucent rounded-3 shadow-sm">
  <!-- PESQUISA E SELETORES -->
  <div class="d-flex flex-wrap gap-2 mb-2 align-items-center">
    <div class="input-group input-group-sm flex-grow-1" style="max-width: 250px;">
      <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
      <input type="text" (input)="pesquisar($event)" class="form-control font-xs" placeholder="Pesquisar...">
    </div>
    
    <select [(ngModel)]="filtros.tipo" (change)="notificarMudanca()" class="form-select form-select-sm w-auto font-xs fw-bold">
      <option value="todos">Todos</option>
      <option value="receita">Receitas</option>
      <option value="despesa">Despesas</option>
    </select>

    <select [(ngModel)]="filtros.categoria" (change)="notificarMudanca()" class="form-select form-select-sm w-auto font-xs">
      <option value="todas">Categorias</option>
      <option *ngFor="let cat of categorias" [value]="cat.id">{{ cat.nome }}</option>
    </select>

    <select [(ngModel)]="filtros.ordenacao" (change)="notificarMudanca()" class="form-select form-select-sm w-auto font-xs text-primary fw-bold">
      <option value="recentes">Recentes</option>
      <option value="antigos">Antigos</option>
    </select>
  </div>

  <!-- CALENDÁRIO COMPACTO -->
  <div class="d-flex align-items-center gap-2 border-top pt-2">
    <small class="fw-bold text-secondary text-uppercase font-xxs">Período:</small>
    <input type="date" [(ngModel)]="filtros.data_inicio" (change)="notificarMudanca()" class="form-control form-control-sm w-auto py-0 px-1 font-xs">
    <span class="font-xs">até</span>
    <input type="date" [(ngModel)]="filtros.data_fim" (change)="notificarMudanca()" class="form-control form-control-sm w-auto py-0 px-1 font-xs">
    
    <button type="button" (click)="limparFiltros()" class="btn btn-link btn-sm text-danger font-xs p-0 ms-auto text-decoration-none">
      <i class="bi bi-x-circle"></i> Limpar
    </button>
  </div>
</div>
