<div class="erp-viewport-total">
  
<!-- Trecho corrigido do app-filtros-lancamento -->
<app-filtros-lancamento 
  [categorias]="categorias"
  [formasPagamento]="formasPagamento" 
  (onSearch)="onSearch($event)" 
  (onFiltroChange)="aplicarFiltrosManuais($event)"
  (onNovoLancamento)="abrirModalCriar()"> <!-- Chamada direta sem travas no HTML -->
</app-filtros-lancamento>

  <!--  BARRA DE FERRAMENTAS E PAGINAÇÃO -->
  <div class="erp-toolbar-flex">
    <button type="button" (click)="abrirModalCriar()" class="btn-erp-novo-vivid">
      Novo ▾
    </button>

    <!-- CONTROLADOR DE PAGINAÇÃO -->
    <div class="erp-pagination-container">
      <button type="button" class="btn-erp-page-arrow" 
              [disabled]="paginaAtual === 1 || carregandoTabela" 
              (click)="mudarPagina(1)">|‹</button>
      
      <button type="button" class="btn-erp-page-arrow" 
              [disabled]="paginaAtual === 1 || carregandoTabela" 
              (click)="mudarPagina(paginaAtual - 1)">‹</button>
      
      <input type="text" [value]="paginaAtual" readonly class="input-page-number-erp">
      <span class="texto-de-paginas-erp">de {{ totalPaginas }}</span>
      
      <button type="button" class="btn-erp-page-arrow" 
              [disabled]="paginaAtual >= totalPaginas || carregandoTabela" 
              (click)="mudarPagina(paginaAtual + 1)">›</button>
      
      <button type="button" class="btn-erp-page-arrow" 
              [disabled]="paginaAtual >= totalPaginas || carregandoTabela" 
              (click)="mudarPagina(totalPaginas)">›|</button>
      
      <span class="erp-text-counter">Registos: {{ totalRegistos }} localizados</span>
    </div>
  </div>

  <!-- TABELA  -->
  <main class="workspace-tabela-fluida">
    <div *ngIf="carregandoTabela" class="d-flex justify-content-center align-items-center py-5">
      <div class="spinner-border text-info" role="status"></div>
    </div>
    
    <app-tabela-lancamento 
      *ngIf="!carregandoTabela"
      [historico]="historicoFiltrado" 
      [usuarioPerfil]="usuarioPerfil"
      (onEditar)="abrirModalEditar($event)" 
      (onExcluir)="abrirModalExcluir($event)">
    </app-tabela-lancamento>
  </main>

  <!--  SISTEMA DE NOTIFICAÇÃO (TOAST) -->
  <div class="safeq-toast-system" [class.active]="exibirToast" [ngClass]="tipoToast">
    <div class="toast-icon">
      <i class="bi" [ngClass]="tipoToast === 'sucesso' ? 'bi-check-circle-fill' : 'bi-exclamation-triangle-fill'"></i>
    </div>
    <div class="toast-body">
      <span class="toast-title">{{ tipoToast === 'sucesso' ? 'Sucesso' : 'Erro de Sistema' }}</span>
      <p class="toast-message">{{ mensagemToast }}</p>
    </div>
    <div class="toast-progress" [class.running]="exibirToast"></div>
  </div>

</div>

<!-- ================= MODAIS DE OPERAÇÃO ================= -->

<!-- MODAL DE CRIAÇÃO -->
<div class="custom-center-modal-overlay" *ngIf="mostrarModalCriar">
  <app-form-lancamento 
    [tipoLancamento]="tipoLancamento"
    [transacao]="transacao"
    [categorias]="categorias"
    [formasPagamento]="formasPagamento"
    [carregando]="carregando"
    [usuarioPerfil]="usuarioPerfil"
    (onMudarTipo)="tipoLancamento = $event"
    (onSalvar)="salvarNovoLancamento()"
    (onCancelar)="fecharModalCriar()">
  </app-form-lancamento>
</div>

<!-- MODAL DE EDIÇÃO -->
<div class="custom-center-modal-overlay" *ngIf="mostrarModalEditar">
  <app-form-lancamento 
    [isEdicao]="true"
    [tipoLancamento]="itemParaEditar.tipo"
    [transacao]="itemParaEditar"
    [categorias]="categorias"
    [formasPagamento]="formasPagamento"
    [carregando]="carregando"
    [usuarioPerfil]="usuarioPerfil"
    (onSalvar)="salvarEdicao()"
    (onCancelar)="fecharModalEditar()">
  </app-form-lancamento>
</div>

<!-- MODAL EXCLUIR -->
<div class="custom-center-modal-overlay" *ngIf="mostrarModalExcluir">
  <div class="erp-modal-window alert-critical">
    <div class="erp-modal-titlebar danger">
      <span class="erp-modal-title-text">Confirmação de Eliminação</span>
      
      <button type="button" (click)="fecharModalExcluir()" class="btn-close-compact" style="border:none; background:none; cursor:pointer;">×</button>
    </div>
    <div class="erp-modal-body-warning">
      <i class="bi bi-exclamation-octagon-fill"></i>
      <div class="warning-text">
        <strong>Atenção: Ação Irreversível</strong><br>
        Deseja remover o lançamento de <strong>{{ itemParaEditar.valor | number:'1.2-2' }} AKZ</strong>?
      </div>
    </div>
    <div class="erp-modal-footer">
      <button type="button" (click)="fecharModalExcluir()" class="btn-sys-gray">Cancelar</button>
      <button type="button" (click)="confirmarExclusao()" class="btn-sys-danger">Confirmar</button>
    </div>
  </div>
</div>
