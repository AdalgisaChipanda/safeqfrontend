<section class="card glass-corporate-card p-3 border-0 mb-3 text-start shadow-sm" style="max-width: 1100px;">
  <div class="d-flex justify-content-between align-items-center mb-2">
    <h6 class="fw-bold text-dark m-0">Parâmetros do Relatório</h6>
    <div class="d-flex gap-2">
      <button (click)="onExcel.emit()" class="btn btn-success btn-sm px-3">Excel</button>
      <button (click)="onPdf.emit()" class="btn btn-dark btn-sm px-3">PDF</button>
    </div>
  </div>

  <!-- Filtros  -->
  <div class="row g-2 align-items-end">
    <div class="col-12 col-md-4">
      <label class="form-label font-xs fw-bold text-secondary mb-1">DEMONSTRATIVO</label>
      <select [(ngModel)]="tipoDemonstrativo" (change)="atualizarFiltros()" class="form-select form-select-sm">
        <option value="geral">Geral Comparativo</option>
        <option value="receita">Receitas</option>
        <option value="despesa">Despesas</option>
      </select>
    </div>
    <div class="col-6 col-md-2">
      <label class="form-label font-xs fw-bold text-secondary mb-1">INÍCIO</label>
      <input type="date" [(ngModel)]="dataInicial" (change)="atualizarFiltros()" class="form-control form-control-sm">
    </div>
    <div class="col-6 col-md-2">
      <label class="form-label font-xs fw-bold text-secondary mb-1">FIM</label>
      <input type="date" [(ngModel)]="dataFinal" (change)="atualizarFiltros()" class="form-control form-control-sm">
    </div>
  </div>
</section>
